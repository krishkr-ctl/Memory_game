<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Memory Game by Krish — Two Player Memory Match</title>

    <!-- Primary SEO -->
    <meta name="description" content="Play Memory Match — a fun two-player memory card game by Krish. Find matching pairs, compete with a friend, and enjoy a lightweight, mobile-friendly HTML game." />
    <meta name="keywords" content="Memory Game, memory match, two player game, Krish, Krish Kumar, matching pairs, HTML game, mobile game, browser game" />
    <meta name="author" content="Krish Kumar (krishkr-ctl)" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#07111f" />

    <!-- Social / Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Memory Game by Krish — Two Player Memory Match" />
    <meta property="og:description" content="Play Memory Match — a fun two-player memory card game by Krish. Find matching pairs and challenge your friends." />
    <meta property="og:url" content="https://github.com/krishkr-ctl/Memory_game" />
    <meta property="og:site_name" content="Memory Game by Krish" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Memory Game by Krish — Two Player Memory Match" />
    <meta name="twitter:description" content="Play Memory Match — a fun two-player memory card game by Krish. Find matching pairs and challenge your friends." />

    <!-- Canonical (points to the repo page; update if you host this on a dedicated domain) -->
    <link rel="canonical" href="https://github.com/krishkr-ctl/Memory_game" />

    <!-- Structured data: Schema.org for a simple WebApplication/Game -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "Memory Match",
      "alternateName": "Memory Game by Krish",
      "author": {
        "@type": "Person",
        "name": "Krish Kumar",
        "url": "https://github.com/krishkr-ctl"
      },
      "description": "A lightweight two-player memory card game built with HTML and JavaScript. Find matching pairs and compete with friends.",
      "applicationCategory": "Game",
      "url": "https://github.com/krishkr-ctl/Memory_game"
    }
    </script>

    <style>
      :root {
        --bg: #07111f;
        --panel: #10233b;
        --accent: #4dd0e1;
        --accent-2: #7b61ff;
        --text: #f5f7fb;
        --muted: #9cb8c9;
        --success: #38d39f;
      }

      * { 
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #16263d);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 12px;
        overflow-x: hidden;
      }

      .game-box {
        width: 100%;
        max-width: 760px;
        background: rgba(16, 35, 59, 0.95);
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .top-link {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 12px;
        color: var(--muted);
        font-weight: 700;
        font-size: 0.85rem;
      }

      .top-link a {
        color: var(--text);
        background: rgba(255,255,255,0.04);
        padding: 6px 10px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.04);
      }

      h1 {
        margin: 0 0 4px;
        text-align: center;
        font-size: clamp(1.5rem, 5vw, 2rem);
      }

      .subtitle {
        text-align: center;
        color: var(--muted);
        margin: 0 0 12px;
        font-size: clamp(0.9rem, 3vw, 1rem);
      }

      .scoreboard {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }

      .score {
        background: rgba(255,255,255,0.06);
        padding: 12px;
        border-radius: 14px;
        text-align: center;
        border: 2px solid transparent;
        transition: all 0.3s ease;
      }

      .score.active {
        border: 2px solid var(--accent);
        background: rgba(77, 208, 225, 0.1);
      }

      .score strong { 
        display: block; 
        font-size: clamp(1rem, 3vw, 1.1rem);
        margin-bottom: 4px;
      }

      .score span {
        font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 10px 16px;
        font: inherit;
        cursor: pointer;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        user-select: none;
      }

      button:active {
        transform: scale(0.95);
      }

      button.secondary {
        background: rgba(255,255,255,0.12);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
        gap: 8px;
        width: 100%;
      }

      .card {
        aspect-ratio: 1 / 1;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--panel), #18324e);
        color: var(--text);
        font-size: clamp(1.2rem, 5vw, 1.8rem);
        font-weight: 700;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        transition: transform 0.15s ease, background 0.15s ease;
        cursor: pointer;
        padding: 0;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }

      .card:hover:not(.matched) { 
        transform: translateY(-2px);
      }

      .card:active:not(.matched) {
        transform: scale(0.95);
      }

      .card.flipped, .card.matched {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }

      .card.matched {
        box-shadow: 0 0 0 2px var(--success);
      }

      .message {
        text-align: center;
        margin-top: 10px;
        min-height: 24px;
        color: var(--muted);
        font-weight: 700;
        font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      }

      .winner-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 16px;
      }

      .winner-overlay.show {
        display: flex;
        animation: fadeIn 0.3s ease;
      }

      .winner-box {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        padding: clamp(20px, 8vw, 28px);
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        animation: popIn 0.4s ease;
        max-width: 100%;
      }

      .winner-box h2 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 5vw, 1.8rem);
      }

      .winner-box p {
        margin: 0 0 12px;
        font-size: clamp(0.9rem, 3vw, 1.05rem);
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes popIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      /* Tablet view */
      @media (min-width: 481px) {
        .grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* Landscape orientation */
      @media (max-height: 500px) {
        body { padding: 8px; }
        .game-box { padding: 12px; }
        h1 { margin-bottom: 2px; }
        .subtitle { margin-bottom: 8px; }
        .scoreboard { margin-bottom: 8px; gap: 8px; }
        .controls { margin-bottom: 8px; gap: 8px; }
        .message { margin-top: 8px; }
      }

      /* Safe area for notched devices */
      @supports (padding: max(0px)) {
        body {
          padding-top: max(12px, env(safe-area-inset-top));
          padding-bottom: max(12px, env(safe-area-inset-bottom));
          padding-left: max(12px, env(safe-area-inset-left));
          padding-right: max(12px, env(safe-area-inset-right));
        }
      }
    </style>
  </head>
  <body>
    <div class="winner-overlay" id="winner-overlay">
      <div class="winner-box">
        <h2 id="winner-title">Winner!</h2>
        <p id="winner-text">Player 1 wins the game!</p>
        <button id="overlay-restart-btn">Restart Game</button>
      </div>
    </div>

    <div class="game-box">
      <div class="top-link">
        <a href="https://github.com/krishkr-ctl" target="_blank" rel="noopener noreferrer">👨‍💻 Krish Kumar</a>
      </div>
      <h1>🎮 Memory Match — Memory Game by Krish</h1>
      <p class="subtitle">Find matching pairs! Two-player mode — great for friends and family.</p>

      <div class="scoreboard">
        <div class="score active" id="player1-score">
          <strong>Player 1</strong>
          <span>0 pairs</span>
        </div>
        <div class="score" id="player2-score">
          <strong>Player 2</strong>
          <span>0 pairs</span>
        </div>
      </div>

      <div class="controls">
        <button id="restart-btn">🔄 Restart</button>
      </div>

      <div class="grid" id="board"></div>
      <div class="message" id="message">Player 1 starts.</div>
    </div>

    <script>
      const emojis = ['🍎', '🍌', '🍒', '🍇', '🥝', '🍍', '🍉', '🍓'];
      const cards = [...emojis, ...emojis];
      const board = document.getElementById('board');
      const message = document.getElementById('message');
      const restartBtn = document.getElementById('restart-btn');
      const overlayRestartBtn = document.getElementById('overlay-restart-btn');
      const player1Score = document.getElementById('player1-score');
      const player2Score = document.getElementById('player2-score');
      const winnerOverlay = document.getElementById('winner-overlay');
      const winnerTitle = document.getElementById('winner-title');
      const winnerText = document.getElementById('winner-text');

      let shuffled = [];
      let flipped = [];
      let matched = [];
      let currentPlayer = 1;
      let scores = { 1: 0, 2: 0 };
      let lockBoard = false;
      let gameState = 'playing';

      function shuffle(array) {
        const copy = [...array];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function buildBoard() {
        board.innerHTML = '';
        shuffled = shuffle(cards);
        flipped = [];
        matched = [];
        lockBoard = false;
        currentPlayer = 1;
        scores = { 1: 0, 2: 0 };
        gameState = 'playing';
        updateScoreboard();
        message.textContent = 'Player 1 starts.';
        winnerOverlay.classList.remove('show');

        shuffled.forEach((emoji, index) => {
          const button = document.createElement('button');
          button.className = 'card';
          button.dataset.index = index;
          button.dataset.emoji = emoji;
          button.textContent = '?';
          button.addEventListener('click', () => handleCardClick(index));
          board.appendChild(button);
        });
      }

      function updateScoreboard() {
        player1Score.querySelector('span').textContent = `${scores[1]} pairs`;
        player2Score.querySelector('span').textContent = `${scores[2]} pairs`;
        player1Score.classList.toggle('active', currentPlayer === 1);
        player2Score.classList.toggle('active', currentPlayer === 2);
      }

      function handleCardClick(index) {
        const card = board.children[index];
        
        // Prevent actions during game over or if card is already processed
        if (gameState !== 'playing' || lockBoard || matched.includes(index) || flipped.includes(index)) {
          return;
        }

        card.textContent = card.dataset.emoji;
        card.classList.add('flipped');
        flipped.push(index);

        if (flipped.length === 2) {
          lockBoard = true;
          const [firstIndex, secondIndex] = flipped;
          const firstCard = board.children[firstIndex];
          const secondCard = board.children[secondIndex];

          if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
            // Match found
            matched.push(firstIndex, secondIndex);
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            scores[currentPlayer] += 1;
            updateScoreboard();
            message.textContent = `🎯 Player ${currentPlayer} found a match!`;
            flipped = [];
            lockBoard = false;

            // Check for game over
            if (matched.length === shuffled.length) {
              gameState = 'over';
              let winner;
              if (scores[1] > scores[2]) {
                winner = '🎉 Player 1 Wins!';
                winnerText.textContent = `Player 1 finished with ${scores[1]} pairs.`;
              } else if (scores[2] > scores[1]) {
                winner = '🎉 Player 2 Wins!';
                winnerText.textContent = `Player 2 finished with ${scores[2]} pairs.`;
              } else {
                winner = '🤝 It\'s a Draw!';
                winnerText.textContent = 'Both players finished with the same score.';
              }
              winnerTitle.textContent = winner;
              setTimeout(() => winnerOverlay.classList.add('show'), 300);
              message.textContent = winner;
            }
          } else {
            // No match
            setTimeout(() => {
              firstCard.textContent = '?';
              secondCard.textContent = '?';
              firstCard.classList.remove('flipped');
              secondCard.classList.remove('flipped');
              currentPlayer = currentPlayer === 1 ? 2 : 1;
              updateScoreboard();
              message.textContent = `Player ${currentPlayer}'s turn.`;
              flipped = [];
              lockBoard = false;
            }, 600);
          }
        }
      }

      const startNewGame = () => buildBoard();

      restartBtn.addEventListener('click', startNewGame);
      overlayRestartBtn.addEventListener('click', startNewGame);

      // Prevent zooming on double tap
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        let now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Start game
      buildBoard();
    </script>
  </body>
</html>
